name: E2E Manual

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Environment URL (e.g. https://staging.example.com)"
        required: true
        type: string
      org_id:
        description: "Organization ID used for the E2E run"
        required: true
        type: string

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate required secret
        run: |
          if [ -z "${{ secrets.E2E_STORAGE_STATE_JSON }}" ]; then
            echo "Missing required secret: E2E_STORAGE_STATE_JSON"
            exit 1
          fi

      - name: Write Playwright storage state
        run: |
          mkdir -p tests/e2e/.auth
          printf '%s' '${{ secrets.E2E_STORAGE_STATE_JSON }}' > tests/e2e/.auth/user.json

      - name: Run E2E tests
        env:
          E2E_BASE_URL: ${{ inputs.base_url }}
          E2E_ORG_ID: ${{ inputs.org_id }}
          E2E_STORAGE_STATE: tests/e2e/.auth/user.json
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
